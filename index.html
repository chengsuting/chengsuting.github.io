<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>程素婷的英语阅读试验</title>
    <style>
        /* --- 你的样式可以保持不变，为了完整性我这里复制一份 --- */
        body {
            font-family: 'Georgia', serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.6;
            color: #1a1a1a;
            background-color: #faf9f8;
        }
        h1 {
            color: #2c3e50;
            border-bottom: 3px solid #e2c9b3;
            display: inline-block;
            padding-bottom: 0.3rem;
        }
        .subtitle {
            color: #7f8c8d;
            font-style: italic;
            margin-top: -0.5rem;
            margin-bottom: 2rem;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 5px solid #e2c9b3;
        }
        .card h2 {
            margin-top: 0;
            color: #2c3e50;
        }
        .note-list {
            list-style: none;
            padding-left: 0;
        }
        .note-list li {
            margin: 0.8rem 0;
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }
        .note-list a {
            color: #8b5a2b;
            text-decoration: none;
            font-weight: 500;
        }
        .note-list a:hover {
            text-decoration: underline;
        }
        .footer {
            margin-top: 3rem;
            text-align: center;
            color: #b0a28a;
            font-size: 0.9rem;
            border-top: 1px solid #e6e0d4;
            padding-top: 1.5rem;
        }
    </style>
</head>
<body>
    <h1>📖 程素婷的英语阅读试验</h1>
    <div class="subtitle">从王尔德的《自深深处》开始，一句一句拆</div>

    <div class="card">
        <h2>📌 正在阅读</h2>
        <p>《自深深处》（De Profundis）—— 奥斯卡·王尔德</p>
        <p>状态：拆解中 🚀</p>
    </div>

    <div class="card">
        <h2>📝 所有笔记</h2>
        <div id="note-list-container">
            <ul class="note-list" id="note-list">
                <li>📡 正在加载笔记列表...</li>
            </ul>
        </div>
    </div>

    <div class="footer">
        🌱 每天拆一句，慢慢来，比较快<br>
        2026 · 程素婷的阅读角落
    </div>

    <script>
        // 读取本地 notes_list.json 文件
        fetch('notes_list.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(notes => {
                const listContainer = document.getElementById('note-list');
                if (!notes || notes.length === 0) {
                    listContainer.innerHTML = '<li>📭 还没有笔记，快写下你的第一篇吧！</li>';
                    return;
                }
                
                const listHtml = notes.map(note => {
                    // 对文件名进行编码，确保链接正确
                    const encodedFile = encodeURIComponent(note.file);
                    return `<li><a href="${encodedFile}">📄 ${note.title}</a></li>`;
                }).join('');
                
                listContainer.innerHTML = listHtml;
            })
            .catch(error => {
                console.error('加载笔记列表失败:', error);
                document.getElementById('note-list').innerHTML = '<li>⚠️ 加载失败，请尝试刷新页面。</li>';
            });
    </script>
</body>
</html>
