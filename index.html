            const apiUrl = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${NOTES_FOLDER}`;
            
            fetch(apiUrl)

                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (!Array.isArray(data) || data.length === 0) {
                        listContainer.innerHTML = '<li>📭 笔记文件夹还是空的，快写下你的第一篇笔记吧！</li>';
                        return;
                    }

                    const mdFiles = data
                        .filter(file => file.name && file.name.endsWith('.md'))
                        .sort((a, b) => b.name.localeCompare(a.name));
                    
                    if (mdFiles.length === 0) {
                        listContainer.innerHTML = '<li>📭 还没有找到 .md 笔记文件，记得用这个后缀哦。</li>';
                        return;
                    }

                    }).join('');
